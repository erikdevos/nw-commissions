<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexwork Grocery List</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
  <div class="container">
    <header>
      <img src="https://www.nexwork.nl/img/Logo_Nexwork_Conclusion.svg" alt="Nexwork" class="logo">
    </header>

    <div class="main-content">
      <section class="form-section" id="formSection">
        <h2>Boodschappen aanvragen</h2>
        <form id="groceryForm">
          <div class="form-group">
            <label for="ahUrl">AH product link *</label>
            <input type="text" id="ahUrl" name="ahUrl" required placeholder="ah.nl/product/...">
          </div>

          <div class="form-group">
            <label for="item">Product naam *</label>
            <input type="text" id="item" name="item" required placeholder="Wordt automatisch ingevuld">
          </div>

          <div class="form-group">
            <label for="imageUrl">Afbeelding url (optioneel)</label>
            <input type="url" id="imageUrl" name="imageUrl" placeholder="Optioneel - handmatig toevoegen">
          </div>

          <div class="form-group">
            <label for="quantity">Hoeveelheid</label>
            <input type="number" id="quantity" name="quantity" min="1" max="10" placeholder="1" value="1">
          </div>

          <div class="form-group">
            <label for="substituteFor">Vervangt</label>
            <input type="text" id="substituteFor" name="substituteFor" placeholder="In plaats van iets anders?">
          </div>

          <div class="form-group">
            <label for="name">Jouw naam *</label>
            <input type="text" id="name" name="name" required placeholder="Jouw naam">
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span class="btn-text">Toevoegen aan lijst</span>
            <span class="btn-loader">Opslaan...</span>
          </button>
        </form>
        <div id="formMessage" class="message hidden"></div>
      </section>

      <section class="list-section">
        <div class="list-header">
          <h2>Boodschappenlijst</h2>
          <div class="header-controls">
            <div class="tabs">
              <button class="tab active" data-status="open">Verzoeken</button>
              <button class="tab" data-status="closed">Besteld</button>
              <button class="tab" data-status="deleted">Verwijderd</button>
            </div>

          </div>
        </div>

        <div id="listMessage" class="message hidden"></div>
        <div id="itemsList" class="items-list">
          <div class="loading">
            <div class="spinner"></div>
            <p>Lijst ophalen...</p>
          </div>
        </div>

        <div class="actions-bar">
          <div class="bulk-actions">
            <button class="btn btn-warning" id="deleteClosedBtn">
              <span class="btn-text">Verwijder bestelde items</span>
              <span class="btn-loader">Verwijderen...</span>
            </button>
            <button class="btn btn-danger" id="deleteAllBtn">
              <span class="btn-text">Verwijder alle items</span>
              <span class="btn-loader">Verwijderen...</span>
            </button>
          <button class="btn btn-secondary" id="copyBtn">
            <span class="btn-text">📋 Lijst kopieren</span>
            <span class="btn-loader">Kopieren...</span>
          </button>
          <button class="btn btn-secondary btn-sm" id="refreshBtn" title="Vernieuwen">
            <svg fill="currentColor" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M19.146 4.854l-1.489 1.489A8 8 0 1 0 12 20a8.094 8.094 0 0 0 7.371-4.886 1 1 0 1 0-1.842-.779A6.071 6.071 0 0 1 12 18a6 6 0 1 1 4.243-10.243l-1.39 1.39a.5.5 0 0 0 .354.854H19.5A.5.5 0 0 0 20 9.5V5.207a.5.5 0 0 0-.854-.353z"/>
            </svg>
          </button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="adminModal" class="modal hidden">
    <div class="modal-content">
      <h3>Admin verificatie</h3>
      <p>Vul admin code in om verder te gaan:</p>
      <input type="password" id="adminCodeInput" placeholder="Admin code">
      <div class="modal-actions">
        <button class="btn btn-secondary" id="adminCancelBtn">Annuleren</button>
        <button class="btn btn-primary" id="adminConfirmBtn">Bevestigen</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
